name: mruby-llm

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Install rake
        run: gem install rake

      - name: Install libcurl
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Clone mruby
        run: git clone --depth 1 https://github.com/mruby/mruby.git ../mruby

      - name: Run tests
        env:
          MRUBY: ${{ github.workspace }}/../mruby
          CURLDIR: /usr
        run: rake test
